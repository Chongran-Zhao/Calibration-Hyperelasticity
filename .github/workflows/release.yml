name: release

# Build a prebuilt Apple Silicon DMG on a version tag, publish it as a GitHub
# release, then sync the rendered Homebrew cask to homebrew-hyperfit.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build aarch64-apple-darwin
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Install Python dependencies
        run: python -m pip install -e ".[desktop,release]"
      - name: Verify tag and project version
        run: |
          version=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("pyproject.toml").read_text()
          print(re.search(r'^version = "([^"]+)"', text, re.MULTILINE).group(1))
          PY
          )
          test "${GITHUB_REF_NAME}" = "v${version}"
      - name: Build desktop DMG
        run: scripts/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: |
            dist/Hyperelastic-Calibration-*.dmg
            dist/Hyperelastic-Calibration-*.sha256

  release:
    name: publish release + cask tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Render Homebrew cask with real checksum
        run: |
          tag="${GITHUB_REF_NAME}"
          dmg=$(ls dist/Hyperelastic-Calibration-v*-aarch64-apple-darwin.dmg)
          version="${dmg#dist/Hyperelastic-Calibration-v}"
          version="${version%-aarch64-apple-darwin.dmg}"
          dmg_sha=$(awk '{print $1}' "dist/Hyperelastic-Calibration-v${version}-aarch64-apple-darwin.dmg.sha256")
          mkdir -p out
          cat > out/hyperelastic-calibration.rb <<EOF
          cask "hyperelastic-calibration" do
            version "${version}"
            sha256 "${dmg_sha}"

            url "https://github.com/Chongran-Zhao/Calibration-Hyperelasticity/releases/download/${tag}/Hyperelastic-Calibration-v#{version}-aarch64-apple-darwin.dmg"
            name "Hyperelastic Calibration"
            desc "Calibrate hyperelastic models from stress-stretch data"
            homepage "https://github.com/Chongran-Zhao/Calibration-Hyperelasticity"

            app "Hyperelastic Calibration.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/Hyperelastic Calibration.app"],
                             sudo: false
            end

            zap trash: "~/.hyperfit"
          end
          EOF
          cat out/hyperelastic-calibration.rb
      - name: Delete existing mutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --yes || true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Hyperelastic-Calibration-*.dmg
            dist/Hyperelastic-Calibration-*.sha256
            out/hyperelastic-calibration.rb
      - name: Push cask to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "No HOMEBREW_TAP_TOKEN secret set; skipping tap update."
            echo "Copy out/hyperelastic-calibration.rb into Chongran-Zhao/homebrew-hyperfit,"
            echo "or add the secret to automate this step."
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Chongran-Zhao/homebrew-hyperfit.git" tap
          mkdir -p tap/Casks
          cp out/hyperelastic-calibration.rb tap/Casks/hyperelastic-calibration.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/hyperelastic-calibration.rb
          git commit -m "hyperelastic-calibration ${GITHUB_REF_NAME#v}" || {
            echo "no changes"
            exit 0
          }
          git push origin HEAD:main
